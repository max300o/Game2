<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fall of Angels — Case File</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .choice-btn { text-align: left; padding-left: 44px; }
  </style>
</head>
<body class="game-page theme-noir">
  <div class="game-header">
    <a href="index.html">← Back</a>
    <span class="header-title">FALL OF ANGELS</span>
    <span class="header-case">CASE #11</span>
  </div>
  <div id="game-container">
    <p style="color:var(--dim)">Loading...</p>

  <canvas class="rain-canvas"></canvas>
  <canvas class="ember-canvas"></canvas>
  <div class="theme-bar">
    <div class="theme-bar-label">THEME</div>
    <div class="theme-dot" data-theme="noir"      title="Noir"></div>
    <div class="theme-dot" data-theme="blood"     title="Blood"></div>
    <div class="theme-dot" data-theme="ghost"     title="Ghost"></div>
    <div class="theme-dot" data-theme="parchment" title="Parchment"></div>
    <div class="theme-dot" data-theme="rain"      title="Rain"></div>
    <div class="theme-dot" data-theme="ember"     title="Ember"></div>
  </div>

  <script src="themes.js"></script>
  <script>initThemes('game-page');</script>
  <script src="story-english.js"></script>

</html>
