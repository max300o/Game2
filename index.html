<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سقوط فرشته‌ها | Fall of Angels</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Special+Elite&family=Caveat:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
    <style>
        /* ===== تمام استایل‌های قبلی ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Patrick Hand', 'Caveat', 'Courier New', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.6s ease;
            background: #f4ece4;
            color: #3a2a1a;
            background-image: linear-gradient(rgba(200, 180, 160, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(200, 180, 160, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .intro-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .intro-box {
            max-width: 520px;
            width: 92%;
            padding: 45px 40px;
            background: #f4ece4;
            border-radius: 16px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            border: 1px solid #d4c5a0;
        }
        .intro-box::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px dashed #d4c5a0;
            border-radius: 12px;
            pointer-events: none;
        }
        .intro-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
        }
        .intro-title {
            font-family: 'Special Elite', cursive;
            font-size: 34px;
            color: #3a2a1a;
            letter-spacing: 4px;
            margin: 0;
        }
        .intro-sub {
            font-family: 'Caveat', cursive;
            font-size: 20px;
            color: #8a7a6a;
            display: block;
            margin-top: 2px;
        }
        .intro-divider {
            width: 60px;
            height: 2px;
            background: #b8860b;
            margin: 18px auto;
            opacity: 0.4;
        }
        .intro-text {
            font-family: 'Patrick Hand', cursive;
            font-size: 18px;
            line-height: 1.9;
            color: #5a4a3a;
            margin: 16px 0 28px;
        }
        .intro-btn {
            padding: 14px 40px;
            font-family: 'Special Elite', cursive;
            font-size: 20px;
            background: #8b0000;
            color: #f4ece4;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .intro-btn:hover {
            background: #cc0000;
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.3);
        }
        .intro-footer {
            margin-top: 20px;
            font-size: 13px;
            color: #a09080;
            letter-spacing: 2px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(244, 236, 228, 0.92);
            border-bottom: 2px solid #d4c5a0;
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.6s ease;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #8a7a6a;
        }
        .header-left .badge-icon {
            font-size: 16px;
        }
        .header-center h1 {
            font-family: 'Special Elite', cursive;
            font-size: 18px;
            letter-spacing: 3px;
            color: #3a2a1a;
            margin: 0;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-btn {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 4px 10px;
            background: rgba(200, 180, 160, 0.3);
            border: 1px solid #d4c5a0;
            border-radius: 30px;
            color: #5a4a3a;
            font-family: 'Patrick Hand', cursive;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .header-btn:hover {
            background: rgba(139, 0, 0, 0.08);
            border-color: #8b0000;
            transform: scale(1.05);
        }
        .header-btn:active {
            transform: scale(0.95);
        }
        .header-btn-icon {
            font-size: 16px;
        }
        .header-btn-label {
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        .game-container {
            flex: 1;
            max-width: 820px;
            margin: 25px auto;
            padding: 16px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        .scene-box {
            background: rgba(244, 236, 228, 0.92);
            border: 1px solid #d4c5a0;
            border-radius: 12px;
            padding: 32px 28px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.06), inset 0 0 40px rgba(200, 180, 160, 0.1);
            position: relative;
            animation: fadeSlideIn 0.5s ease forwards;
            transition: all 0.6s ease;
        }
        .scene-box::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px dashed rgba(200, 180, 160, 0.3);
            border-radius: 8px;
            pointer-events: none;
        }
        @keyframes fadeSlideIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .narrative {
            font-family: 'Patrick Hand', 'Caveat', cursive;
            font-size: 20px;
            line-height: 2.1;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-bottom: 24px;
            color: #3a2a1a;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }
        .choices {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }
        .choice-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            font-family: 'Patrick Hand', cursive;
            font-size: 18px;
            text-align: right;
            background: rgba(200, 180, 160, 0.15);
            border: 1px solid #d4c5a0;
            border-radius: 8px;
            color: #3a2a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        .choice-btn:hover {
            background: rgba(139, 0, 0, 0.06);
            border-color: #8b0000;
            transform: translateX(-6px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.03);
        }
        .choice-btn:active {
            transform: scale(0.97);
        }
        .profile-card {
            background: rgba(200, 180, 160, 0.15);
            border: 1px solid #d4c5a0;
            border-radius: 12px;
            padding: 25px 28px;
            margin: 16px 0;
            text-align: center;
        }
        .profile-title {
            font-size: 13px;
            letter-spacing: 3px;
            color: #8a7a6a;
            margin: 4px 0;
        }
        .profile-label {
            font-family: 'Special Elite', cursive;
            font-size: 30px;
            color: #3a2a1a;
            margin: 12px 0 8px;
        }
        .profile-text {
            font-family: 'Patrick Hand', cursive;
            font-size: 17px;
            line-height: 1.8;
            color: #5a4a3a;
            padding: 8px 0;
        }
        .restart-btn {
            display: inline-block;
            padding: 10px 32px;
            margin: 16px auto 0;
            background: transparent;
            border: 2px solid #8b0000;
            color: #3a2a1a;
            font-family: 'Special Elite', cursive;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .restart-btn:hover {
            background: #8b0000;
            color: #f4ece4;
            box-shadow: 0 0 40px rgba(139, 0, 0, 0.2);
        }
        .game-footer {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #a09080;
            border-top: 1px solid #d4c5a0;
            margin-top: 16px;
            display: flex;
            justify-content: center;
            gap: 14px;
            align-items: center;
            opacity: 0.5;
        }

<body>

    <!-- ===== INTRO ===== -->
    <div id="intro-screen" class="intro-screen">
        <div class="intro-box">
            <span class="intro-icon">🕊️</span>
            <h1 class="intro-title">سقوط فرشته‌ها</h1>
            <span class="intro-sub">— The Fall of Angels —</span>
            <div class="intro-divider"></div>
            <p class="intro-text">
                شهر فریمانت، جایی که درب خانه‌ها هرگز قفل نمی‌شود.<br />
                اما حالا یک قاتل زنجیره‌ای آرامش را برهم زده است.<br />
                شما کارآگاه ویلیام هستید. پرونده‌ای که نباید باز می‌شد...
            </p>
            <button id="btn-start-game" class="intro-btn">شروع ماجرا</button>
            <div class="intro-footer">🕵️ Fremant P.D. — Case #011</div>
        </div>
    </div>

    <!-- ===== HEADER ===== -->
    <header id="game-header" class="game-header" style="display:none;">
        <div class="header-left">
            <span class="badge-icon">📁</span>
            <span class="badge-text" id="case-id">پرونده #۰۱۱</span>
        </div>
        <div class="header-center">
            <h1 id="header-title">سقوط فرشته‌ها</h1>
        </div>
        <div class="header-right">
            <button id="btn-lang" class="header-btn" title="تغییر زبان">
                <span class="header-btn-icon">🌐</span>
                <span class="header-btn-label" id="lang-label">فا</span>
            </button>
            <button id="btn-theme" class="header-btn" title="تغییر تم">
                <span class="header-btn-icon">🌙</span>
                <span class="header-btn-label" id="theme-label">تم</span>
            </button>
        </div>
    </header>

    <!-- ===== GAME ===== -->
    <main id="game-container" class="game-container" style="display:none;"></main>

    <!-- ===== FOOTER ===== -->
    <footer id="game-footer" class="game-footer" style="display:none;">
        <span>🕵️‍♂️</span>
        <span>Fremant P.D.</span>
        <span>🔍</span>
    </footer>

    <!-- ===== SCRIPTS ===== -->
    <script src="story_fa.js"></script>
    <script src="story_en.js"></script>
    <script>
        /**
         * =============================================================
         *  FALL OF ANGELS — v7 (Fixed all bugs)
         *  رفع باگ‌های B1 تا B8
         * =============================================================
         */

        'use strict';

        console.log('🔍 Game engine v7 loaded (embedded)');

        // ===== CHECK STORY FILES =====
        let storyLoadError = false;
        if (typeof STORY_FA === 'undefined') {
            console.error('❌ STORY_FA is not defined!');
            storyLoadError = true;
        }
        if (typeof STORY_EN === 'undefined') {
            console.error('❌ STORY_EN is not defined!');
            storyLoadError = true;
        }
        if (typeof PROFILES === 'undefined') {
            console.error('❌ PROFILES is not defined!');
            storyLoadError = true;
        }

        // ===== STATE =====
        const STATE = {
            lang: 'fa',
            theme: 'noir',
            gameStarted: false,
            currentScene: 'intro',
            params: { justice: 0, empathy: 0, pragmatism: 0, doubt: 0, resolve: 0 },
            history: [], // فقط برای مسیرهای یکتا
            historyFull: [], // (B4) ترتیب کامل بازدید با تایم‌استمپ
            choicesMade: {},
        };

        // ===== DOM REFS =====
        const $ = (id) => document.getElementById(id);
        const DOM = {
            intro: $('intro-screen'),
            header: $('game-header'),
            container: $('game-container'),
            footer: $('game-footer'),
            caseId: $('case-id'),
            headerTitle: $('header-title'),
            btnStart: $('btn-start-game'),
            btnLang: $('btn-lang'),
            btnTheme: $('btn-theme'),
            langLabel: $('lang-label'),
            themeLabel: $('theme-label'),
        };

        // ===== UTILITY =====
        function getStory() {
            if (storyLoadError) return null;
            if (STATE.lang === 'en') return STORY_EN;
            return STORY_FA;
        }

        function getProfile(params) {
            if (storyLoadError || typeof PROFILES === 'undefined') {
                return { label: 'Unknown', text: 'Profile not found.' };
            }
            for (const p of PROFILES) {
                if (p.condition(params)) return p;
            }
            return PROFILES[PROFILES.length - 1];
        }

        // ===== (B5) safeHtml: جایگزین escapeHtml برای مجاز کردن تگ‌های ساده =====
        function safeHtml(str) {
            // فقط تگ‌های مجاز: <b>, <i>, <u>, <br>, <strong>, <em>, <span>
            const allowedTags = ['b', 'i', 'u', 'br', 'strong', 'em', 'span'];
            // ابتدا کاراکترهای خطرناک رو تبدیل کن
            let safe = str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            // بعد تگ‌های مجاز رو برگردون (با regex ساده)
            allowedTags.forEach(tag => {
                const open = new RegExp(`&lt;${tag}([^&gt;]*)&gt;`, 'g');
                const close = new RegExp(`&lt;/${tag}&gt;`, 'g');
                safe = safe.replace(open, `<${tag}$1>`).replace(close, `</${tag}>`);
            });
            return safe;
        }

        // ===== SAVE / LOAD =====
        function saveGame() {
            try {
                const data = {
                    lang: STATE.lang,
                    theme: STATE.theme,
                    gameStarted: STATE.gameStarted,
                    currentScene: STATE.currentScene,
                    params: STATE.params,
                    history: STATE.history,
                    historyFull: STATE.historyFull,
                    choicesMade: STATE.choicesMade
                };
                localStorage.setItem('fallen_angels_v7', JSON.stringify(data));
            } catch (e) { console.warn('Save failed:', e); }
        }

        function loadGame() {
            try {
                const raw = localStorage.getItem('fallen_angels_v7');
                if (!raw) return false;
                const data = JSON.parse(raw);
                STATE.lang = data.lang || 'fa';
                STATE.theme = data.theme || 'noir';
                STATE.gameStarted = data.gameStarted || false;
                STATE.currentScene = data.currentScene || 'intro';
                STATE.params = data.params || { justice: 0, empathy: 0, pragmatism: 0, doubt: 0, resolve: 0 };
                STATE.history = data.history || [];
                STATE.historyFull = data.historyFull || [];
                STATE.choicesMade = data.choicesMade || {};
                return true;
            } catch (e) { return false; }
        }

        // ===== THEME =====
        function applyTheme(theme) {
            const themes = ['noir', 'blood', 'retro', 'ice', 'silver', 'royal'];
            document.body.classList.remove(...themes.map(t => `theme-${t}`));
            document.body.classList.add(`theme-${theme}`);
            STATE.theme = theme;
            if (DOM.themeLabel) {
                const labels = { noir: '🖤', blood: '🩸', retro: '📜', ice: '❄️', silver: '⚪', royal: '👑' };
                DOM.themeLabel.textContent = labels[theme] || 'تم';
            }
            saveGame();
        }

        // ===== LANGUAGE =====
        function applyLanguage(lang) {
            STATE.lang = lang;
            if (DOM.langLabel) DOM.langLabel.textContent = lang === 'fa' ? 'فا' : 'En';
            if (DOM.headerTitle) DOM.headerTitle.textContent = lang === 'fa' ? 'سقوط فرشته‌ها' : 'Fall of Angels';
            if (DOM.caseId) DOM.caseId.textContent = lang === 'fa' ? 'پرونده #۰۱۱' : 'CASE #011';
            saveGame();
        }

        // ===== RENDER =====
        function renderScene(sceneId) {
            const story = getStory();
            if (!story || storyLoadError) {
                // (B7) Fallback: صفحه‌ی خطا با گزینه‌ی ریست
                DOM.container.innerHTML = `
                    <div class="scene-box">
                        <p style="color:red;font-size:20px;">❌ خطا: فایل‌های داستان پیدا نشد.</p>
                        <p style="color:#888;">لطفاً فایل‌های story_fa.js و story_en.js را بررسی کنید.</p>
                        <button class="choice-btn restart-btn" id="error-restart-btn" style="margin-top:20px;">🔄 بارگذاری مجدد</button>
                    </div>
                `;
                document.getElementById('error-restart-btn')?.addEventListener('click', () => location.reload());
                return;
            }

            // (B1) اگر صحنه وجود نداشت، به intro برگرد
            let scene = story[sceneId];
            if (!scene) {
                console.warn(`⚠️ Scene "${sceneId}" not found. Redirecting to intro.`);
                scene = story['intro'];
                if (!scene) {
                    // اگه intro هم نبود، خطا بده
                    DOM.container.innerHTML = `
                        <div class="scene-box">
                            <p style="color:red;font-size:20px;">❌ صحنه‌ی "${sceneId}" و همچنین "intro" پیدا نشد.</p>
                            <button class="choice-btn restart-btn" id="error-restart-btn2" style="margin-top:20px;">🔄 شروع مجدد</button>
                        </div>
                    `;
                    document.getElementById('error-restart-btn2')?.addEventListener('click', () => {
                        localStorage.removeItem('fallen_angels_v7');
                        location.reload();
                    });
                    return;
                }
                // اصلاح sceneId برای ذخیره‌سازی
                sceneId = 'intro';
                STATE.currentScene = 'intro';
            }

            // (B4) تاریخچه کامل با تایم‌استمپ
            STATE.historyFull.push({
                scene: sceneId,
                time: new Date().toISOString(),
                lang: STATE.lang
            });
            if (!STATE.history.includes(sceneId)) STATE.history.push(sceneId);

            STATE.currentScene = sceneId;
            saveGame();

            if (scene.isEnding) {
                renderEnding(scene);
                return;
            }

            const narrative = scene.text.join('\n');
            // (B5) استفاده از safeHtml به جای escapeHtml
            const narrativeHtml = safeHtml(narrative);

            const choicesHtml = (scene.choices && scene.choices.length > 0) ?
                scene.choices.map((c, i) =>
                    `<button class="choice-btn" data-scene="${sceneId}" data-choice="${i}">${safeHtml(c.label)}</button>`
                ).join('') :
                '<p class="no-choices">[ پایان صحنه ]</p>';

            DOM.container.innerHTML = `
                <div class="scene-box">
                    <pre class="narrative">${narrativeHtml}</pre>
                    <div class="choices">${choicesHtml}</div>
                </div>
            `;

            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.choice, 10);
                    makeChoice(sceneId, idx);
                });
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function makeChoice(sceneId, choiceIndex) {
            const story = getStory();
            if (!story) return;
            const scene = story[sceneId];
            if (!scene) return;
            const choice = scene.choices[choiceIndex];
            if (!choice) return;

            STATE.choicesMade[sceneId] = choiceIndex;
            if (choice.params) {
                for (const [key, val] of Object.entries(choice.params)) {
                    if (STATE.params.hasOwnProperty(key)) STATE.params[key] += val;
                }
            }
            saveGame();
            renderScene(choice.next);
        }

        function renderEnding(scene) {
            const profile = getProfile(STATE.params);
            const sceneText = scene.text.join('\n');
            const isEn = STATE.lang === 'en';

            DOM.container.innerHTML = `
                <div class="scene-box ending">
                    <pre class="narrative">${safeHtml(sceneText)}</pre>
                    <div class="profile-card">
                        <div class="profile-title">━━━━━━━━━━━━━━━━━━━━━</div>
                        <div class="profile-title">${isEn ? "William's Profile" : 'پروفایل ویلیام'}</div>
                        <div class="profile-title">━━━━━━━━━━━━━━━━━━━━━</div>
                        <div class="profile-label">${profile.label}</div>
                        <div class="profile-text">${profile.text}</div>
                    </div>
                    <div class="choices">
                        <button class="choice-btn restart-btn" id="btn-restart">${isEn ? 'Start Over' : 'شروع دوباره'}</button>
                    </div>
                </div>
            `;

            document.getElementById('btn-restart')?.addEventListener('click', fullReset);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== (B6) FULL RESET =====
        function fullReset() {
            console.log('🔄 Full reset');
            localStorage.removeItem('fallen_angels_v7');
            STATE.gameStarted = false;
            STATE.currentScene = 'intro';
            STATE.params = { justice: 0, empathy: 0, pragmatism: 0, doubt: 0, resolve: 0 };
            STATE.history = [];
            STATE.historyFull = [];
            STATE.choicesMade = {};
            // نمایش صفحه‌ی معرفی
            DOM.intro.classList.remove('hidden');
            DOM.header.style.display = 'none';
            DOM.container.style.display = 'none';
            DOM.footer.style.display = 'none';
            // ریست امن
            saveGame();
        }

        // ===== GAME ACTIONS =====
        function startGame() {
            console.log('🚀 startGame()');
            STATE.gameStarted = true;
            STATE.currentScene = 'intro';
            STATE.params = { justice: 0, empathy: 0, pragmatism: 0, doubt: 0, resolve: 0 };
            STATE.history = [];
            STATE.historyFull = [];
            STATE.choicesMade = {};

            DOM.intro.classList.add('hidden');
            DOM.header.style.display = 'flex';
            DOM.container.style.display = 'block';
            DOM.footer.style.display = 'flex';

            renderScene('intro');
            saveGame();
        }

        function continueGame() {
            if (STATE.gameStarted) {
                DOM.intro.classList.add('hidden');
                DOM.header.style.display = 'flex';
                DOM.container.style.display = 'block';
                DOM.footer.style.display = 'flex';
                renderScene(STATE.currentScene);
            } else {
                startGame();
            }
        }

        // ===== INIT =====
        function init() {
            const hasSave = loadGame();

            // اگر خطای لود استوری داشتیم، بازی رو متوقف نکن، صفحه‌ی خطا نشون بده
            if (storyLoadError) {
                DOM.intro.classList.add('hidden');
                DOM.header.style.display = 'flex';
                DOM.container.style.display = 'block';
                DOM.footer.style.display = 'flex';
                DOM.container.innerHTML = `
                    <div class="scene-box">
                        <p style="color:red;font-size:20px;">❌ خطا در بارگذاری فایل‌های داستان</p>
                        <p style="color:#888;">فایل‌های story_fa.js و story_en.js را بررسی کنید.</p>
                        <button class="choice-btn restart-btn" id="init-error-btn" style="margin-top:20px;">🔄 بارگذاری مجدد</button>
                    </div>
                `;
                document.getElementById('init-error-btn')?.addEventListener('click', () => location.reload());
                return;
            }

            applyTheme(STATE.theme);
            applyLanguage(STATE.lang);

            if (hasSave && STATE.gameStarted) {
                continueGame();
            } else {
                DOM.intro.classList.remove('hidden');
                DOM.header.style.display = 'none';
                DOM.container.style.display = 'none';
                DOM.footer.style.display = 'none';
            }

            // ===== رویدادها =====
            DOM.btnStart?.addEventListener('click', startGame);

            DOM.btnLang?.addEventListener('click', function() {
                const newLang = STATE.lang === 'fa' ? 'en' : 'fa';
                applyLanguage(newLang);
                if (STATE.gameStarted) renderScene(STATE.currentScene);
            });

            DOM.btnTheme?.addEventListener('click', function() {
                const themes = ['noir', 'blood', 'retro', 'ice', 'silver', 'royal'];
                const currentIndex = themes.indexOf(STATE.theme);
                const nextIndex = (currentIndex + 1) % themes.length;
                applyTheme(themes[nextIndex]);
            });

            console.log('✅ Game v7 initialized');
            console.log('📚 STORY_FA:', typeof STORY_FA !== 'undefined');
            console.log('📚 STORY_EN:', typeof STORY_EN !== 'undefined');
            console.log('📚 PROFILES:', typeof PROFILES !== 'undefined');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
