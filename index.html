<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پرونده سقوط فرشته‌ها | The Fall of Angels</title>
  <style>
    :root {
      --bg: #111;
      --text: #ddd;
      --accent: #c00;
    }
    body { 
      font-family: 'Tahoma', Arial, sans-serif; 
      margin: 0; padding: 0; 
      background: var(--bg); 
      color: var(--text); 
      line-height: 1.6;
    }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.95); padding: 10px 15px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 1000; border-bottom: 2px solid var(--accent);
    }
    button {
      background: #222; color: white; border: 1px solid #555;
      padding: 6px 12px; margin: 0 4px; cursor: pointer; border-radius: 4px;
      font-size: 0.95em;
    }
    button:hover { background: #444; }
    #game-container { max-width: 850px; margin: 80px auto 40px; padding: 20px; }
    .scene { 
      background: #1a1a1a; padding: 25px; border-radius: 8px; 
      border: 1px solid #333; min-height: 280px;
    }
    .choice-btn {
      display: block; width: 100%; margin: 10px 0;
      padding: 12px; background: #222; border: 1px solid #555;
      text-align: right; border-radius: 6px;
    }
    .choice-btn:hover { background: #333; border-color: var(--accent); }

    /* تم‌ها */
    .theme-retro { --bg: #2c1e12; --text: #e8d5b8; --accent: #b85; }
    .theme-noir { --bg: #0a0a0a; --text: #aaa; --accent: #ccc; filter: contrast(1.1); }
    .theme-digital { --bg: #001100; --text: #00ff88; --accent: #0f0; font-family: monospace; }

    h1 { text-align: center; color: var(--accent); }
    #intro-screen, #end-screen { text-align: center; padding: 40px 20px; }
  </style>
</head>
<body>
  <div id="header">
    <div>
      <button id="theme-btn">تغییر تم</button>
      <button id="lang-btn">EN / FA</button>
    </div>
    <div id="game-title">پرونده سقوط فرشته‌ها</div>
  </div>

  <div id="game-container">
    <!-- صفحه معرفی -->
    <div id="intro-screen">
      <h1>The Fall of Angels</h1>
      <p>یک بازی تعاملی جنایی روانشناختی در شهری مذهبی و پر رمز و راز...</p>
      <p style="margin: 20px 0; font-size: 1.1em;">
        تو نقش یک کارآگاه جوان وارد پرونده‌ای می‌شی که ممکنه سرنوشتت رو برای همیشه تغییر بده.
      </p>
      <button id="start-btn" style="font-size: 1.3em; padding: 18px 40px;">شروع بازی</button>
    </div>

    <!-- صفحه اصلی بازی -->
    <div id="game-screen" style="display: none;">
      <div class="scene" id="scene"></div>
      <div id="choices"></div>
      <div style="margin-top: 20px; text-align: center;">
        <small>عدالت: <span id="justice">0</span> | همدلی: <span id="empathy">0</span> | شک: <span id="doubt">0</span></small>
      </div>
    </div>

    <!-- صفحه پایان -->
    <div id="end-screen" style="display: none;">
      <h2>پایان پرونده</h2>
      <div id="ending-text"></div>
      <button id="restart-btn">بازی دوباره</button>
    </div>
  </div>

  <script>
    // ==================== داده‌های داستان (نمونه) ====================
    const STORY_EN = {
      intro: {
        id: 'intro',
        text: ["The Fall of 2025. A small religious town. A murdered priest. You are the detective sent to investigate."],
        choices: [
          { text: "Start the investigation", next: 'scene1' }
        ]
      },
      scene1: {
        id: 'scene1',
        text: ["You arrive at the crime scene. The body is still there..."],
        choices: [
          { text: "Examine the body carefully", next: 'scene2', params: {justice: 1} },
          { text: "Talk to the witnesses first", next: 'scene2', params: {empathy: 1} }
        ]
      }
      // بعداً داستان کامل رو اینجا گسترش می‌دیم
    };

    const STORY_FA = {
      intro: {
        id: 'intro',
        text: ["پاییز ۱۴۰۴. یک شهر کوچک مذهبی. قتل یک کشیش. تو کارآگاه فرستاده شده‌ای."],
        choices: [
          { text: "شروع تحقیقات", next: 'scene1' }
        ]
      },
      scene1: {
        id: 'scene1',
        text: ["به محل جنایت رسیدی. جسد هنوز آنجا هست..."],
        choices: [
          { text: "جسد را با دقت بررسی کن", next: 'scene2', params: {justice: 1} },
          { text: "اول با شاهدان صحبت کن", next: 'scene2', params: {empathy: 1} }
        ]
      }
    };

    // ==================== متغیرهای بازی ====================
    let currentStory = STORY_FA;
    let currentSceneId = 'intro';
    let playerParams = { justice: 0, empathy: 0, pragmatism: 0, doubt: 0, resolve: 0 };
    let currentTheme = 'default';

    // ==================== توابع اصلی ====================
    function renderScene() {
      const scene = currentStory[currentSceneId];
      if (!scene) return;

      document.getElementById('scene').innerHTML = `<p>${scene.text.join('<br><br>')}</p>`;

      const choicesDiv = document.getElementById('choices');
      choicesDiv.innerHTML = '';

      scene.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice.text;
        btn.onclick = () => makeChoice(choice);
        choicesDiv.appendChild(btn);
      });

      // بروزرسانی پارامترها
      document.getElementById('justice').textContent = playerParams.justice;
      document.getElementById('empathy').textContent = playerParams.empathy;
      document.getElementById('doubt').textContent = playerParams.doubt;
    }

    function makeChoice(choice) {
      if (choice.params) {
        Object.keys(choice.params).forEach(key => {
          playerParams[key] = (playerParams[key] || 0) + choice.params[key];
        });
      }

      if (choice.next === 'end') {
        showEnding();
      } else {
        currentSceneId = choice.next;
        renderScene();
      }
    }

    function showEnding() {
      document.getElementById('game-screen').style.display = 'none';
      const endScreen = document.getElementById('end-screen');
      endScreen.style.display = 'block';

      let ending = "شما پرونده را حل کردید.<br><br>";
      ending += `عدالت: ${playerParams.justice} | همدلی: ${playerParams.empathy} | شک: ${playerParams.doubt}`;

      document.getElementById('ending-text').innerHTML = ending;
    }

    function toggleTheme() {
      const themes = ['default', 'retro', 'noir', 'digital'];
      const currentIndex = themes.indexOf(currentTheme);
      currentTheme = themes[(currentIndex + 1) % themes.length];
      
      document.body.className = `theme-${currentTheme}`;
      console.log('تم تغییر کرد به:', currentTheme);
    }

    function toggleLanguage() {
      currentStory = currentStory === STORY_FA ? STORY_EN : STORY_FA;
      currentSceneId = 'intro';
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('intro-screen').style.display = 'block';
      console.log('زبان تغییر کرد');
    }

    // ==================== Event Listeners ====================
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('intro-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';
      renderScene();
    });

    document.getElementById('theme-btn').addEventListener('click', toggleTheme);
    document.getElementById('lang-btn').addEventListener('click', toggleLanguage);
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());

    // تشخیص خودکار زبان مرورگر
    if (navigator.language.startsWith('en')) {
      currentStory = STORY_EN;
    }

    console.log("بازی با موفقیت لود شد! 🎮");
  </script>
</body>
</html>
