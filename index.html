<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>FREEMONT POLICE TERMINAL v1.98</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="crt-frame">
    <div class="crt-screen">

        <div id="boot-sequence" class="boot">
            <pre class="boot-text">
FREEMONT POLICE DEPARTMENT
SECURE TERMINAL SYSTEM v1.98

Booting...
Checking memory............. OK
Loading kernel.............. OK
Decrypting case files....... OK
Establishing secure link.... OK

<span class="blink">PRESS ANY KEY TO CONTINUE_</span>
            </pre>
        </div>

        <div id="terminal" class="hidden">
            <div id="output" class="terminal-output"></div>
            <div id="choices" class="terminal-choices"></div>
        </div>

    </div>
</div>

<script src="story.js"></script>
<script src="game.js"></script>

<script>
document.addEventListener("keydown", () => {
    document.getElementById("boot-sequence").classList.add("hidden");
    document.getElementById("terminal").classList.remove("hidden");
});
</script>

</body>
</html>
