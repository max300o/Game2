<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FALL OF ANGELS | Noir Case</title>

<style>
body{
  margin:0;
  font-family: monospace;
  background:#0b0b0f;
  color:#d6d6d6;
}

/* --- TOP BAR --- */
header{
  background:#111;
  border-bottom:1px solid #2a2a2a;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  background:#1a1a1a;
  color:#ddd;
  border:1px solid #333;
  padding:6px 10px;
  cursor:pointer;
}
button:hover{
  border-color:#8b0000;
  color:#fff;
}

/* --- MAIN SCENE --- */
#app{
  max-width:800px;
  margin:20px auto;
  padding:15px;
}

.scene{
  background:linear-gradient(145deg,#111,#0a0a0a);
  border:1px solid #2a2a2a;
  padding:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  position:relative;
}

/* خون/نوآر خطی */
.scene:before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:#8b0000;
  opacity:0.6;
}

/* متن داستان */
pre{
  white-space:pre-wrap;
  font-size:16px;
  line-height:1.8;
  color:#e0e0e0;
}

/* گزینه‌ها */
.choice{
  width:100%;
  margin-top:10px;
  padding:10px;
  text-align:right;
  background:#141414;
  border:1px solid #2a2a2a;
}
.choice:hover{
  background:#1f1f1f;
  border-color:#8b0000;
  transform:translateX(-4px);
}

/* افکت نویز خیلی سبک */
body:after{
  content:"";
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  pointer-events:none;
  background-image:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.05;
}
</style>
</head>

<body>

<header>
  <button id="lang">FA / EN</button>
  <button id="theme">NOIR</button>
</header>

<div id="app"></div>

<script src="story_fa.js"></script>
<script src="story_en.js"></script>

<script>
let lang="fa";
let sceneId="intro";

function story(){
  return lang==="fa"?window.STORY_FA:window.STORY_EN;
}

function render(){
  const s=story();
  const sc=s?.[sceneId];

  if(!sc){
    document.getElementById("app").innerHTML="<div class='scene'>ERROR</div>";
    return;
  }

  let html=`<div class="scene"><pre>${sc.text.join("\n")}</pre>`;

  sc.choices?.forEach((c,i)=>{
    html+=`<button class="choice" onclick="go(${i})">${c.label}</button>`;
  });

  html+="</div>";

  document.getElementById("app").innerHTML=html;
}

function go(i){
  const sc=story()[sceneId];
  sceneId=sc.choices[i].next;
  render();
}

document.getElementById("lang").onclick=()=>{
  lang=lang==="fa"?"en":"fa";
  sceneId="intro";
  render();
};

document.getElementById("theme").onclick=()=>{
  document.body.classList.toggle("alt");
};

render();
</script>

</body>
</html>
