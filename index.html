<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سقوط فرشته‌ها | Fall of Angels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Cinzel:wght@400;600&family=Share+Tech+Mono&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050400;
            --paper: #0a0900;
            --gold: #c9a227;
            --gold2: #f0d060;
            --text: #e8d890;
            --mid: #a07820;
            --dim: #3a3000;
            --dark-gold: #7a5c00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── SLIDESHOW (single image, 10s) ── */
        #intro {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #intro-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        #intro-img.loaded {
            opacity: 1;
        }
        #intro-vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.7) 100%);
        }
        #intro-bar-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.5);
        }
        #intro-bar {
            height: 100%;
            width: 0%;
            background: var(--gold);
            box-shadow: 0 0 12px var(--gold), 0 0 4px var(--gold2);
            transition: width 10s linear;
        }
        #intro-skip {
            position: absolute;
            bottom: 28px;
            right: 28px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(201, 162, 39, 0.5);
            color: rgba(201, 162, 39, 0.85);
            padding: 9px 22px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.25s;
            backdrop-filter: blur(4px);
        }
        #intro-skip:hover {
            border-color: var(--gold);
            color: var(--gold2);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.25);
            background: rgba(0, 0, 0, 0.7);
        }

        /* ── BELL (always on top - left side) ── */
        #bell-wrap {
            position: fixed;
            top: 18px;
            left: 22px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        #bell-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            outline: none;
        }
        #bell-btn svg {
            width: 34px;
            height: 34px;
            filter: drop-shadow(0 0 6px rgba(201, 162, 39, 0.5));
            transition: filter 0.2s, transform 0.2s;
        }
        #bell-btn:hover svg {
            transform: scale(1.1);
            filter: drop-shadow(0 0 14px rgba(240, 208, 96, 0.8));
        }
        #bell-btn.off svg {
            opacity: 0.35;
            filter: none;
        }
        @keyframes swing {
            0%,
            100% {
                transform: rotate(0)
            }
            20% {
                transform: rotate(12deg)
            }
            50% {
                transform: rotate(-10deg)
            }
            75% {
                transform: rotate(6deg)
            }
        }
        #bell-btn.on svg {
            animation: swing 3s ease-in-out infinite;
            transform-origin: top center;
        }
        #bell-lbl {
            font-size: 0.4rem;
            letter-spacing: 2.5px;
            color: rgba(201, 162, 39, 0.45);
            font-family: 'Share Tech Mono', monospace;
        }

        /* ── MAIN PAGE ── */
        #main {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }
        #main.show {
            display: flex;
        }
        #main::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.006) 2px, rgba(255, 255, 255, 0.006) 4px);
        }
        #main::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at center, rgba(201, 162, 39, 0.05) 0%, transparent 65%);
        }

        .box {
            max-width: 580px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2000;
            padding: 44px 36px 40px;
            position: relative;
            background: var(--paper);
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.95), 0 0 50px rgba(201, 162, 39, 0.06), inset 0 0 70px rgba(0, 0, 0, 0.65);
            z-index: 2;
        }
        .box::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 1px solid #1a1400;
            pointer-events: none;
        }
        .c {
            position: absolute;
            width: 16px;
            height: 16px;
            border-style: solid;
            border-color: var(--gold);
            opacity: 0.45;
        }
        .tl {
            top: 4px;
            left: 4px;
            border-width: 1px 0 0 1px
        }
        .tr {
            top: 4px;
            right: 4px;
            border-width: 1px 1px 0 0
        }
        .bl {
            bottom: 4px;
            left: 4px;
            border-width: 0 0 1px 1px
        }
        .br {
            bottom: 4px;
            right: 4px;
            border-width: 0 1px 1px 0
        }

        /* ── LOGO AREA ── */
        .logo-area {
            margin: 0 0 18px;
            position: relative;
            z-index: 1;
            padding: 10px 0 0;
        }
        .logo-svg {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 460px;
            height: auto;
            filter: drop-shadow(0 0 18px rgba(201, 162, 39, 0.35));
        }

        /* ── SEPARATOR ── */
        .sep {
            border: none;
            border-top: 1px solid #1a1400;
            margin: 20px 0 24px;
            position: relative;
        }
        .sep::before {
            content: '◆';
            position: absolute;
            top: -7px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--paper);
            padding: 0 10px;
            font-size: 0.45rem;
            color: var(--gold);
            letter-spacing: 2px;
        }

        /* ── TAGLINE ── */
        .tagline {
            font-family: 'Cinzel', 'Cormorant Garamond', serif;
            font-size: 0.78rem;
            line-height: 2;
            color: rgba(201, 162, 39, 0.6);
            position: relative;
            z-index: 1;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .tagline .fa {
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 300;
            font-size: 0.8rem;
            direction: rtl;
            display: block;
            color: rgba(201, 162, 39, 0.4);
            margin-top: 2px;
            letter-spacing: 0;
        }

        /* ── BUTTONS ── */
        .btns {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 4px;
            margin-bottom: 26px;
            position: relative;
            z-index: 1;
        }
        .btn {
            background: transparent;
            border: 1px solid #3a3000;
            color: var(--text);
            padding: 14px 0;
            width: 160px;
            min-width: 160px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .btn:hover {
            border-color: var(--gold);
            color: var(--gold2);
            box-shadow: 0 0 24px rgba(201, 162, 39, 0.12), inset 0 0 24px rgba(201, 162, 39, 0.04);
        }
        .btn:hover::after {
            transform: scaleX(1);
        }

        .footer {
            font-size: 0.46rem;
            letter-spacing: 2px;
            color: #1a1400;
            line-height: 2.2;
            position: relative;
            z-index: 1;
            font-family: 'Share Tech Mono', monospace;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 520px) {
            .box {
                padding: 28px 14px 26px;
            }
            .btns {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            .btn {
                width: 180px;
                min-width: 180px;
                font-size: 0.8rem;
                padding: 12px 0;
            }
            .logo-svg {
                max-width: 300px;
            }
            #bell-wrap {
                top: 10px;
                left: 10px;
            }
            #bell-btn svg {
                width: 28px;
                height: 28px;
            }
            #intro-skip {
                bottom: 16px;
                right: 12px;
                padding: 6px 14px;
                font-size: 0.5rem;
            }
            .tagline {
                font-size: 0.68rem;
            }
            .tagline .fa {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- BELL always visible - positioned on LEFT side -->
    <div id="bell-wrap">
        <button id="bell-btn" class="off" title="Toggle Music">
            <svg viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="32" y1="2" x2="32" y2="10" stroke="#c9a227" stroke-width="2.5" stroke-linecap="round" />
                <path d="M32 10 C18 10 12 22 12 36 L12 50 Q12 54 16 54 L48 54 Q52 54 52 50 L52 36 C52 22 46 10 32 10Z"
                fill="url(#bgBell)" stroke="#c9a227" stroke-width="1.5" />
                <path d="M22 18 C20 22 18 28 18 34" stroke="rgba(255,235,120,0.3)" stroke-width="2.5" stroke-linecap="round" />
                <rect x="11" y="50" width="42" height="6" rx="3" fill="url(#rimBell)" stroke="#c9a227" stroke-width="1" />
                <circle cx="32" cy="61" r="4.5" fill="url(#clapBell)" stroke="#c9a227" stroke-width="1" />
                <line x1="20" y1="42" x2="44" y2="42" stroke="rgba(201,162,39,0.3)" stroke-width="1" />
                <defs>
                    <linearGradient id="bgBell" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#f0d060" /><stop offset="40%" stop-color="#c9a227" /><stop offset="100%" stop-color="#7a5c00" />
                    </linearGradient>
                    <linearGradient id="rimBell" x1="11" y1="50" x2="53" y2="56" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#e8c040" /><stop offset="100%" stop-color="#6a4e00" />
                    </linearGradient>
                    <radialGradient id="clapBell" cx="50%" cy="40%" r="60%">
                        <stop offset="0%" stop-color="#e8c040" /><stop offset="100%" stop-color="#7a5c00" />
                    </radialGradient>
                </defs>
            </svg>
        </button>
        <span id="bell-lbl">MUSIC</span>
    </div>

    <!-- SLIDESHOW - Single image, 10 seconds -->
    <div id="intro">
        <img id="intro-img" alt="" />
        <div id="intro-vignette"></div>
        <div id="intro-bar-wrap"><div id="intro-bar"></div></div>
        <button id="intro-skip">SKIP &#9654;</button>
    </div>

    <!-- MAIN PAGE -->
    <div id="main">
        <div class="box">
            <div class="c tl"></div><div class="c tr"></div>
            <div class="c bl"></div><div class="c br"></div>

            <!-- LOGO: French-style elegant gold logo with delicate wings -->
            <div class="logo-area">
                <svg class="logo-svg" viewBox="0 0 480 150" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Wing gradient - delicate gold -->
                        <linearGradient id="wingG" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#f8e8a0" />
                            <stop offset="15%" stop-color="#f0d060" />
                            <stop offset="45%" stop-color="#c9a227" />
                            <stop offset="75%" stop-color="#8a6510" />
                            <stop offset="100%" stop-color="#5a3e00" />
                        </linearGradient>
                        <!-- Frame gradient -->
                        <linearGradient id="frameG" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#f0d060" />
                            <stop offset="30%" stop-color="#c9a227" />
                            <stop offset="70%" stop-color="#8a6510" />
                            <stop offset="100%" stop-color="#6a4e00" />
                        </linearGradient>
                        <!-- Text gradient -->
                        <linearGradient id="txtG" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#fffce8" />
                            <stop offset="20%" stop-color="#f8e8a0" />
                            <stop offset="45%" stop-color="#d4a830" />
                            <stop offset="70%" stop-color="#b8861e" />
                            <stop offset="100%" stop-color="#7a5c00" />
                        </linearGradient>
                        <!-- Glow -->
                        <filter id="glowF" x="-25%" y="-25%" width="150%" height="150%">
                            <feGaussianBlur stdDeviation="1.5" result="b" />
                            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
                        </filter>
                        <filter id="glowSoft" x="-35%" y="-35%" width="170%" height="170%">
                            <feGaussianBlur stdDeviation="3" result="b" />
                            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
                        </filter>
                    </defs>

                    <!-- === HALO / ANGEL EMBLEM ABOVE === -->
                    <g filter="url(#glowSoft)" opacity="0.85">
                        <!-- Outer delicate ring -->
                        <ellipse cx="240" cy="16" rx="22" ry="6" stroke="url(#frameG)" stroke-width="0.7" fill="none" />
                        <ellipse cx="240" cy="16" rx="22" ry="6" fill="url(#txtG)" opacity="0.08" />
                        <!-- Inner thin ring -->
                        <ellipse cx="240" cy="16" rx="16" ry="4" stroke="url(#frameG)" stroke-width="0.5" fill="none" opacity="0.6" />
                        <!-- Central diamond star -->
                        <path d="M240 6 L243 14 L240 22 L237 14 Z" fill="#f8e8a0" opacity="0.8" filter="url(#glowF)" />
                        <circle cx="240" cy="14" r="2" fill="#fffce8" opacity="0.9" />
                        <!-- Tiny rays -->
                        <line x1="228" y1="16" x2="222" y2="16" stroke="#c9a227" stroke-width="0.4" opacity="0.5" />
                        <line x1="252" y1="16" x2="258" y2="16" stroke="#c9a227" stroke-width="0.4" opacity="0.5" />
                    </g>

                    <!-- === LEFT WING (delicate, thin, French elegance) === -->
                    <g filter="url(#glowF)">
                        <!-- Primary sweep -->
                        <path d="M130 38 C100 28, 55 18, 12 6"
                        stroke="url(#wingG)" stroke-width="1.8" fill="none" stroke-linecap="round" />
                        <!-- Upper feather layer -->
                        <path d="M130 42 C98 34, 50 26, 6 16"
                        stroke="url(#wingG)" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.85" />
                        <!-- Mid feather layer -->
                        <path d="M130 48 C100 42, 55 36, 14 30"
                        stroke="url(#wingG)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7" />
                        <!-- Lower feather layer -->
                        <path d="M130 55 C102 50, 60 46, 20 42"
                        stroke="url(#wingG)" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.55" />
                        <!-- Extra fine detail -->
                        <path d="M130 52 C105 48, 65 44, 24 40"
                        stroke="url(#wingG)" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.4" />
                        <!-- Feather tip dots -->
                        <circle cx="12" cy="6" r="1.8" fill="#f8e8a0" opacity="0.85" />
                        <circle cx="6" cy="16" r="1.4" fill="#f0d060" opacity="0.65" />
                        <circle cx="14" cy="30" r="1.1" fill="#d4a830" opacity="0.5" />
                        <circle cx="20" cy="42" r="0.8" fill="#b8861e" opacity="0.35" />
                    </g>

                    <!-- === RIGHT WING (mirrored) === -->
                    <g filter="url(#glowF)" transform="translate(480,0) scale(-1,1)">
                        <path d="M130 38 C100 28, 55 18, 12 6"
                        stroke="url(#wingG)" stroke-width="1.8" fill="none" stroke-linecap="round" />
                        <path d="M130 42 C98 34, 50 26, 6 16"
                        stroke="url(#wingG)" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.85" />
                        <path d="M130 48 C100 42, 55 36, 14 30"
                        stroke="url(#wingG)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7" />
                        <path d="M130 55 C102 50, 60 46, 20 42"
                        stroke="url(#wingG)" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.55" />
                        <path d="M130 52 C105 48, 65 44, 24 40"
                        stroke="url(#wingG)" stroke-width="0.5" fill="none" stroke-linecap="round" opacity="0.4" />
                        <circle cx="12" cy="6" r="1.8" fill="#f8e8a0" opacity="0.85" />
                        <circle cx="6" cy="16" r="1.4" fill="#f0d060" opacity="0.65" />
                        <circle cx="14" cy="30" r="1.1" fill="#d4a830" opacity="0.5" />
                        <circle cx="20" cy="42" r="0.8" fill="#b8861e" opacity="0.35" />
                    </g>

                    <!-- === ORNATE CENTRAL FRAME === -->
                    <!-- Outer frame -->
                    <rect x="128" y="32" width="224" height="82" rx="0"
                    stroke="url(#frameG)" stroke-width="1" fill="none" opacity="0.85" />
                    <!-- Inner frame -->
                    <rect x="134" y="38" width="212" height="70" rx="0"
                    stroke="url(#frameG)" stroke-width="0.5" fill="none" opacity="0.4" />
                    <!-- Subtle fill -->
                    <rect x="128" y="32" width="224" height="82" rx="0"
                    fill="#0a0900" opacity="0.3" />

                    <!-- === CORNER ORNAMENTS === -->
                    <!-- Top-left -->
                    <path d="M128 32 L142 32 L128 46 Z" fill="url(#txtG)" opacity="0.35" />
                    <circle cx="128" cy="32" r="2.5" fill="#f8e8a0" opacity="0.7" filter="url(#glowF)" />
                    <circle cx="128" cy="32" r="1" fill="#fffce8" opacity="0.9" />
                    <!-- Top-right -->
                    <path d="M352 32 L338 32 L352 46 Z" fill="url(#txtG)" opacity="0.35" />
                    <circle cx="352" cy="32" r="2.5" fill="#f8e8a0" opacity="0.7" filter="url(#glowF)" />
                    <circle cx="352" cy="32" r="1" fill="#fffce8" opacity="0.9" />
                    <!-- Bottom-left -->
                    <path d="M128 114 L142 114 L128 100 Z" fill="url(#txtG)" opacity="0.35" />
                    <circle cx="128" cy="114" r="2.5" fill="#f8e8a0" opacity="0.7" filter="url(#glowF)" />
                    <circle cx="128" cy="114" r="1" fill="#fffce8" opacity="0.9" />
                    <!-- Bottom-right -->
                    <path d="M352 114 L338 114 L352 100 Z" fill="url(#txtG)" opacity="0.35" />
                    <circle cx="352" cy="114" r="2.5" fill="#f8e8a0" opacity="0.7" filter="url(#glowF)" />
                    <circle cx="352" cy="114" r="1" fill="#fffce8" opacity="0.9" />

                    <!-- === DECORATIVE SIDE ACCENTS === -->
                    <!-- Left side small diamonds -->
                    <path d="M120 55 L123 60 L120 65 L117 60 Z" fill="#c9a227" opacity="0.4" />
                    <path d="M120 75 L123 80 L120 85 L117 80 Z" fill="#c9a227" opacity="0.4" />
                    <path d="M120 95 L123 100 L120 105 L117 100 Z" fill="#c9a227" opacity="0.4" />
                    <!-- Right side small diamonds -->
                    <path d="M360 55 L363 60 L360 65 L357 60 Z" fill="#c9a227" opacity="0.4" />
                    <path d="M360 75 L363 80 L360 85 L357 80 Z" fill="#c9a227" opacity="0.4" />
                    <path d="M360 95 L363 100 L360 105 L357 100 Z" fill="#c9a227" opacity="0.4" />

                    <!-- === "FALL OF" TEXT (upper line, thin & elegant) === -->
                    <text x="240" y="58" text-anchor="middle"
                    font-family="'Cormorant Garamond', 'Cormorant', 'Georgia', 'Times New Roman', serif"
                    font-weight="300" font-size="17" font-style="italic"
                    letter-spacing="11" fill="url(#txtG)" filter="url(#glowF)">
                        F A L L &nbsp;&nbsp; O F
                    </text>

                    <!-- === "ANGELS" TEXT (lower line, bolder) === -->
                    <text x="240" y="93" text-anchor="middle"
                    font-family="'Cormorant Garamond', 'Cormorant', 'Georgia', 'Times New Roman', serif"
                    font-weight="500" font-size="30"
                    letter-spacing="9" fill="url(#txtG)" filter="url(#glowF)">
                        A N G E L S
                    </text>

                    <!-- === BOTTOM DECORATIVE LINE === -->
                    <line x1="160" y1="108" x2="320" y2="108" stroke="url(#frameG)" stroke-width="0.5" opacity="0.45" />
                    <circle cx="240" cy="108" r="2" fill="#f8e8a0" opacity="0.55" filter="url(#glowF)" />
                    <line x1="230" y1="108" x2="250" y2="108" stroke="#f8e8a0" stroke-width="0.8" opacity="0.5" />
                </svg>
            </div>

            <div class="sep"></div>

            <!-- TAGLINE - Bilingual -->
            <div class="tagline">
                Angels will fall, just as humans did.
                <span class="fa">فرشته‌ها سقوط خواهند کرد، همان‌گونه که انسان‌ها کردند.</span>
            </div>

            <!-- BUTTONS - equal size -->
            <div class="btns">
                <a class="btn" href="game-fa.html">PERSIAN</a>
                <a class="btn" href="game-en.html">ENGLISH</a>
            </div>

            <div class="footer">
                &#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;<br>
                EVIDENCE FILE — DO NOT DISTRIBUTE — CASE OPEN
            </div>
        </div>
    </div>

    <audio id="snd" loop preload="auto"></audio>

    <script>
        (function() {
            // ── Images (sequential, one per visit) ──
            const IMGS = [
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303150271.png',
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303780335.png',
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303829426.png',
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303879821.png',
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782303927143.png',
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304117198.png',
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304316279.png',
                'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/1782304529088.png',
            ];

            const STORAGE_KEY = 'foa_slideshow_index';
            const DISPLAY_DURATION = 10000; // 10 seconds
            const FADE_DURATION = 600;

            // ── Get stored index ──
            function getStoredIndex() {
                try {
                    const v = localStorage.getItem(STORAGE_KEY);
                    return v ? parseInt(v, 10) % IMGS.length : 0;
                } catch (e) {
                    return 0;
                }
            }

            function storeNextIndex(idx) {
                try {
                    localStorage.setItem(STORAGE_KEY, (idx + 1) % IMGS.length);
                } catch (e) {}
            }

            // ── DOM refs ──
            const imgEl = document.getElementById('intro-img');
            const introEl = document.getElementById('intro');
            const barEl = document.getElementById('intro-bar');
            const skipBtn = document.getElementById('intro-skip');
            const mainEl = document.getElementById('main');
            const snd = document.getElementById('snd');
            const bellBtn = document.getElementById('bell-btn');
            const bellLbl = document.getElementById('bell-lbl');

            // ── Music ──
            const MUSIC_URL = 'https://raw.githubusercontent.com/max300o/Game2-images/refs/heads/main/music.mp3';
            snd.src = MUSIC_URL;
            snd.volume = 0.5;

            let musicPlaying = false;
            let userToggledBell = false;
            let audioUnlocked = false;

            function setPlayingState(v) {
                musicPlaying = v;
                bellBtn.className = v ? 'on' : 'off';
                bellLbl.textContent = v ? 'MUSIC' : 'MUTED';
            }

            function attemptPlay() {
                if (userToggledBell && !musicPlaying) return;
                if (musicPlaying) return;
                const promise = snd.play();
                if (promise && promise.then) {
                    promise.then(() => {
                        setPlayingState(true);
                        audioUnlocked = true;
                    }).catch(() => {
                        setPlayingState(false);
                    });
                }
            }

            // Aggressive autoplay attempts
            function aggressiveAutoplay() {
                attemptPlay();
                // Retry multiple times
                const retries = [300, 800, 1500, 3000, 5000, 8000];
                retries.forEach(delay => {
                    setTimeout(() => {
                        if (!musicPlaying && !userToggledBell) attemptPlay();
                    }, delay);
                });
            }

            // Bell button
            bellBtn.addEventListener('click', () => {
                userToggledBell = true;
                if (musicPlaying) {
                    snd.pause();
                    setPlayingState(false);
                } else {
                    const p = snd.play();
                    if (p && p.then) {
                        p.then(() => setPlayingState(true)).catch(() => setPlayingState(false));
                    }
                }
            });

            // ── Slideshow ──
            const currentIdx = getStoredIndex();
            let slideshowDone = false;
            let imageLoaded = false;
            let timerStarted = false;
            let mainTimer = null;
            let fallbackTimer = null;

            function endSlideshow() {
                if (slideshowDone) return;
                slideshowDone = true;
                if (mainTimer) clearTimeout(mainTimer);
                if (fallbackTimer) clearTimeout(fallbackTimer);

                introEl.style.transition = 'opacity 0.7s ease';
                introEl.style.opacity = '0';
                setTimeout(() => {
                    introEl.style.display = 'none';
                    mainEl.classList.add('show');
                    // Try music after slideshow
                    if (!musicPlaying) attemptPlay();
                }, 700);
            }

            function startCountdown() {
                if (timerStarted) return;
                timerStarted = true;
                // Animate bar
                barEl.style.transition = `width ${DISPLAY_DURATION}ms linear`;
                requestAnimationFrame(() => {
                    barEl.style.width = '100%';
                });
                // Set timer to end
                mainTimer = setTimeout(endSlideshow, DISPLAY_DURATION);
            }

            function loadAndShowImage() {
                const src = IMGS[currentIdx];
                const testImg = new Image();

                testImg.onload = function() {
                    imgEl.src = src;
                    imgEl.classList.add('loaded');
                    imageLoaded = true;
                    if (!timerStarted) startCountdown();
                };

                testImg.onerror = function() {
                    // Image failed - still start countdown
                    if (!timerStarted) startCountdown();
                };

                testImg.src = src;

                // Fallback: start countdown after 3s even if image not fully loaded
                fallbackTimer = setTimeout(() => {
                    if (!timerStarted) {
                        imgEl.classList.add('loaded');
                        startCountdown();
                    }
                }, 3000);
            }

            // Skip button
            skipBtn.addEventListener('click', endSlideshow);

            // Store next index for next visit
            storeNextIndex(currentIdx);

            // ── START ──
            loadAndShowImage();
            aggressiveAutoplay();

            // ── Additional music triggers on ANY user interaction ──
            function onUserInteraction() {
                if (!musicPlaying && !userToggledBell) {
                    attemptPlay();
                }
            }
            document.addEventListener('click', onUserInteraction, { passive: true });
            document.addEventListener('touchstart', onUserInteraction, { passive: true });
            document.addEventListener('keydown', onUserInteraction, { passive: true });
            document.addEventListener('scroll', onUserInteraction, { passive: true, once: true });

            // ── Preload remaining images for future visits ──
            IMGS.forEach((src, i) => {
                if (i !== currentIdx) {
                    const preImg = new Image();
                    preImg.src = src;
                }
            });

            // ── Handle page visibility change (retry music when user returns) ──
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && !musicPlaying && !userToggledBell) {
                    attemptPlay();
                }
            });

        })();
    </script>
</body>
