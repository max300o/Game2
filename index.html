<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سقوط فرشته‌ها | پرونده‌های فریمانت</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="noir-overlay"></div>

    <div class="game-container">
        <header class="game-header">
            <div class="location">📍 پرونده‌ی سقوط فرشته‌ها</div>
            <div class="controls">
                <button id="theme-noir-btn" class="control-btn">🎬 تم نوآر</button>
                <button id="theme-retro-btn" class="control-btn">📟 تم رترو</button>
                <button id="reset-btn" class="control-btn reset">🔄 شروع مجدد</button>
            </div>
        </header>

        <main class="game-main">
            <div id="story-text" class="story-box">
                </div>

            <div id="choices-container" class="choices-box">
                </div>
        </main>

        <footer class="game-footer">
            <p>فرمان یازدهم: هرگز از چیزی که هستید فرار نکنید.</p>
        </footer>
    </div>

    <script src="story.js"></script>
</body>
</html>
