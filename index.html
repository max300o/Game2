<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پرونده‌ی سقوط فرشته‌ها</title>

  <!-- فونت‌های خاص فضای نوآر و کارآگاهی -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=Courier+Prime:ital@0;1&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0c0a;
      color: #c9c1b4;
      font-family: 'Courier Prime', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      transition: background 0.4s, color 0.4s;
    }

    /* ============================================================
       ظرف اصلی بازی – شبیه به یک پرونده کهنه
       ============================================================ */
    #app-wrapper {
      max-width: 820px;
      width: 100%;
      background: #1a1714;
      border: 2px double #5a4e44;
      border-radius: 12px;
      padding: 24px 28px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 0 1px #3a322b;
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }

    /* هدر با عنوان و دکمه‌های کنترل */
    .game-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px dashed #4a3f36;
    }

    .game-title {
      font-family: 'Special Elite', 'Playfair Display', serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: #d4c6b2;
      text-shadow: 2px 2px 0 #0a0806;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar button {
      background: #2a241f;
      border: 1px solid #5a4e44;
      color: #c9c1b4;
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.5px;
    }

    .toolbar button:hover {
      background: #3d332b;
      border-color: #8f7a66;
      color: #f0e6d8;
      box-shadow: 0 0 10px rgba(200, 160, 120, 0.15);
    }

    .toolbar button:active {
      transform: scale(0.96);
    }

    /* ============================================================
       محتوای اصلی – توسط Game رندر می‌شود
       ============================================================ */
    #game-container {
      min-height: 360px;
      padding: 8px 0 4px;
      font-size: 1rem;
      line-height: 1.7;
    }

    .narrative {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 0.98rem;
      line-height: 1.8;
      background: #1e1b17;
      padding: 18px 20px;
      border-radius: 8px;
      border-left: 4px solid #6a5a4a;
      margin-bottom: 26px;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
      color: #ddd2c4;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .choice-btn {
      background: #26211c;
      border: 1px solid #5a4e44;
      color: #d4c6b2;
      font-family: 'Courier Prime', 'Courier New', monospace;
      font-size: 1rem;
      padding: 14px 22px;
      border-radius: 8px;
      text-align: right;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 0 #0f0d0a;
      position: relative;
      letter-spacing: 0.3px;
    }

    .choice-btn:hover {
      background: #3d322a;
      border-color: #ab8f78;
      color: #f5ece2;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #0f0d0a, 0 0 20px rgba(180, 140, 100, 0.1);
    }

    .choice-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0f0d0a;
    }

    .no-choices {
      color: #6a5e52;
      font-style: italic;
      padding: 10px 0;
    }

    /* ============================================================
       کارت پروفایل در پایان بازی
       ============================================================ */
    .profile-card {
      background: #1e1a16;
      border: 1px solid #5a4e44;
      border-radius: 10px;
      padding: 24px 22px;
      margin: 28px 0 22px;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .profile-title {
      font-family: 'Special Elite', serif;
      font-size: 1.2rem;
      color: #baa48c;
      text-align: center;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .profile-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #e8dac8;
      text-align: center;
      margin: 12px 0 10px;
      text-shadow: 0 0 10px rgba(200, 160, 120, 0.2);
    }

    .profile-text {
      font-size: 0.98rem;
      line-height: 1.8;
      color: #c9c1b4;
      padding: 8px 4px;
      border-top: 1px dashed #4a3f36;
      margin-top: 12px;
      padding-top: 16px;
      text-align: justify;
    }

    .restart-btn {
      background: #3a2e26;
      border: 2px solid #8f7a66;
      color: #f0e6d8;
      font-family: 'Special Elite', serif;
      font-size: 1.2rem;
      padding: 16px 28px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 10px;
      letter-spacing: 2px;
      width: 100%;
    }

    .restart-btn:hover {
      background: #5a4638;
      border-color: #c4aa92;
      box-shadow: 0 0 30px rgba(180, 140, 100, 0.2);
    }

    /* ============================================================
       تم RETRO (روشن، کاغذی)
       ============================================================ */
    body.theme-retro {
      background: #d9cfc0;
      color: #2d241e;
    }

    body.theme-retro #app-wrapper {
      background: #ece1d2;
      border-color: #8b7a66;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 0 0 1px #b8a690;
    }

    body.theme-retro .game-title {
      color: #3f3228;
      text-shadow: 1px 1px 0 #b8a690;
    }

    body.theme-retro .toolbar button {
      background: #d4c6b2;
      border-color: #8b7a66;
      color: #2d241e;
    }

    body.theme-retro .toolbar button:hover {
      background: #c0ae96;
      border-color: #5f4d3a;
      color: #1e1712;
    }

    body.theme-retro .narrative {
      background: #f2eadc;
      border-left-color: #8b7a66;
      color: #2d241e;
      box-shadow: inset 0 0 20px rgba(80, 60, 40, 0.15);
    }

    body.theme-retro .choice-btn {
      background: #e5d8c6;
      border-color: #8b7a66;
      color: #2d241e;
      box-shadow: 0 4px 0 #a6907a;
    }

    body.theme-retro .choice-btn:hover {
      background: #d4c2ab;
      border-color: #6a5542;
      color: #1e1712;
      box-shadow: 0 6px 0 #a6907a;
    }

    body.theme-retro .profile-card {
      background: #efe6d6;
      border-color: #8b7a66;
    }

    body.theme-retro .profile-title {
      color: #5f4d3a;
    }

    body.theme-retro .profile-label {
      color: #3f3228;
    }

    body.theme-retro .profile-text {
      color: #2d241e;
      border-top-color: #b8a690;
    }

    body.theme-retro .restart-btn {
      background: #d4c2ab;
      border-color: #8b7a66;
      color: #2d241e;
    }

    body.theme-retro .restart-btn:hover {
      background: #c0ae96;
      border-color: #5f4d3a;
      color: #1e1712;
    }

    /* ============================================================
       تم NOIR (تیره‌تر با لهجه‌های قرمز)
       ============================================================ */
    body.theme-noir #app-wrapper {
      background: #0f0d0b;
      border-color: #3a2e26;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), inset 0 0 0 1px #3a2e26;
    }

    body.theme-noir .narrative {
      background: #14110e;
      border-left-color: #7a2e2e;
      color: #ddd2c4;
    }

    body.theme-noir .choice-btn {
      background: #1f1a16;
      border-color: #5a2e2e;
      color: #d4c6b2;
      box-shadow: 0 4px 0 #2a1e1a;
    }

    body.theme-noir .choice-btn:hover {
      background: #33261f;
      border-color: #a03a3a;
      color: #f5ece2;
      box-shadow: 0 6px 0 #2a1e1a, 0 0 20px rgba(160, 40, 40, 0.15);
    }

    body.theme-noir .profile-card {
      background: #14110e;
      border-color: #5a2e2e;
    }

    body.theme-noir .profile-title {
      color: #a03a3a;
    }

    body.theme-noir .profile-label {
      color: #d4b8a0;
    }

    body.theme-noir .profile-text {
      color: #c9b8a8;
      border-top-color: #3a2e26;
    }

    body.theme-noir .restart-btn {
      background: #2a1e1a;
      border-color: #7a2e2e;
      color: #d4c6b2;
    }

    body.theme-noir .restart-btn:hover {
      background: #3a2a22;
      border-color: #a03a3a;
      color: #f5ece2;
    }

    /* ============================================================
       واکنش‌گرایی
       ============================================================ */
    @media (max-width: 600px) {
      #app-wrapper {
        padding: 16px 14px 22px;
      }
      .game-title {
        font-size: 1.1rem;
      }
      .toolbar button {
        font-size: 0.75rem;
        padding: 4px 12px;
      }
      .narrative {
        font-size: 0.92rem;
        padding: 14px 16px;
      }
      .choice-btn {
        font-size: 0.9rem;
        padding: 12px 16px;
      }
      .profile-label {
        font-size: 1.3rem;
      }
    }

    @media (max-width: 420px) {
      .game-header {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
      }
      .toolbar {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div id="app-wrapper">
    <!-- هدر بازی -->
    <header class="game-header">
      <div class="game-title">پروندهٔ سقوط فرشته‌ها</div>
      <div class="toolbar">
        <button id="theme-retro-btn" aria-label="تم کلاسیک">📜 رِترو</button>
        <button id="theme-noir-btn"  aria-label="تم نوآر">🕵️ نوآر</button>
        <button id="reset-btn"       aria-label="شروع مجدد">⟳ بازنشانی</button>
      </div>
    </header>

    <!-- ظرف رندر بازی (محتوای داستان توسط story.js تولید می‌شود) -->
    <div id="game-container"></div>

    <!-- پی نوشت -->
    <footer style="margin-top:24px; border-top:1px dashed #3a322b; padding-top:14px; font-size:0.7rem; color:#5a4e44; text-align:center; letter-spacing:1px;">
      ·  پروندهٔ سقوط فرشته‌ها  ·  رمز و راز در فریمانت  ·
    </footer>
  </div>

  <!-- ============================================================
       بارگذاری فایل story.js که شامل تمام داده‌ها و کلاس Game است
       ============================================================ -->
  <script src="story.js"></script>

  <!-- ============================================================
       اسکریپت راه‌اندازی (با فرض اینکه story.js خودش game را
       مقداردهی و دکمه‌ها را متصل می‌کند، اما برای اطمینان دوباره
       آن را صدا می‌زنیم)
       ============================================================ -->
  <script>
    (function() {
      // اگر game قبلاً توسط story.js ساخته نشده باشد، یک نمونه می‌سازیم
      if (typeof game === 'undefined') {
        window.game = new Game();
      }

      // در صورت بارگذاری مجدد صفحه، اطمینان از مقداردهی
      document.addEventListener('DOMContentLoaded', function() {
        if (window.game && !window.game.state) {
          window.game.initGame();
        }
      });

      // اگر صفحه از قبل بارگذاری شده، مستقیماً مقداردهی کن
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        if (window.game && !window.game.state) {
          window.game.initGame();
        }
      }
    })();
  </script>
</body>
</html>
