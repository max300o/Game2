<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سقوط فرشته‌ها | Fall of Angels</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Special+Elite&family=Caveat:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ========================================================= -->
    <!-- صفحه معرفی (فقط یکبار در ابتدای بازی)                    -->
    <!-- ========================================================= -->
    <div id="intro-screen" class="intro-screen">
        <div class="intro-box">
            <div class="intro-icon">🕊️</div>
            <h1 class="intro-title">سقوط فرشته‌ها</h1>
            <p class="intro-sub">— The Fall of Angels —</p>
            <div class="intro-divider"></div>
            <p class="intro-text">
                شهر فریمانت، جایی که درب خانه‌ها هرگز قفل نمی‌شود.<br />
                اما حالا یک قاتل زنجیره‌ای آرامش را برهم زده است.<br />
                شما کارآگاه ویلیام هستید. پرونده‌ای که نباید باز می‌شد...
            </p>
            <button id="btn-start-game" class="intro-btn">شروع ماجرا</button>
            <div class="intro-footer">🕵️ Fremant P.D. — Case #011</div>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- هدر بازی (با دو دکمه کوچیک)                              -->
    <!-- ========================================================= -->
    <header id="game-header" class="game-header" style="display:none;">
        <div class="header-left">
            <span class="badge-icon">📁</span>
            <span class="badge-text" id="case-id">CASE #011</span>
        </div>
        <div class="header-center">
            <h1 id="header-title">سقوط فرشته‌ها</h1>
        </div>
        <div class="header-right">
            <!-- دکمه تغییر زبان (کوچک) -->
            <button id="btn-lang" class="header-btn" title="تغییر زبان">
                <span class="header-btn-icon">🌐</span>
                <span class="header-btn-label" id="lang-label">فا</span>
            </button>
            <!-- دکمه تغییر تم (کوچک) -->
            <button id="btn-theme" class="header-btn" title="تغییر تم">
                <span class="header-btn-icon">🌙</span>
                <span class="header-btn-label" id="theme-label">تم</span>
            </button>
        </div>
    </header>

    <!-- ========================================================= -->
    <!-- محفظه بازی                                                -->
    <!-- ========================================================= -->
    <main id="game-container" class="game-container" style="display:none;">
        <!-- توسط جاوااسکریپت پر می‌شود -->
    </main>

    <!-- ========================================================= -->
    <!-- فوتر                                                      -->
    <!-- ========================================================= -->
    <footer id="game-footer" class="game-footer" style="display:none;">
        <span>🕵️‍♂️</span>
        <span>Fremant P.D.</span>
        <span>🔍</span>
    </footer>

    <!-- ========================================================= -->
    <!-- اسکریپت‌ها (فایل‌های استوری)                             -->
    <!-- ========================================================= -->
    <script src="story_fa.js"></script>
    <script src="story_en.js"></script>
    <script src="game.js"></script>
</body>
</html>
