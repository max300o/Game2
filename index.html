<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>THE FALL MACHINE – DEEP ARCHIVE TERMINAL</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="device">
    <div class="device-frame">
        <div class="device-bezel"></div>
        <div class="device-screen">
            <div id="crt-glass"></div>
            <div id="crt-reflection"></div>

            <!-- BOOT -->
            <div id="boot" class="layer">
                <pre id="boot-text"></pre>
            </div>

            <!-- TERMINAL -->
            <div id="terminal" class="layer hidden">
                <div id="output"></div>
                <div id="choices"></div>
            </div>

            <div class="scanlines"></div>
        </div>
    </div>
</div>

<script src="story.js"></script>

<script>
// BOOT TEXT
const bootLines = [
"SECURE TERMINAL SYSTEM v1.98",
"",
"Booting...",
"Checking memory............. OK",
"Loading kernel.............. OK",
"Decrypting case files....... OK",
"Establishing secure link.... OK",
"",
"PRESS ANY KEY TO CONTINUE_"
];

let i = 0;
function typeBoot() {
    if (i < bootLines.length) {
        document.getElementById("boot-text").innerText += bootLines[i] + "\n";
        i++;
        setTimeout(typeBoot, 45);
    }
}
window.onload = typeBoot;

// SWITCH TO TERMINAL
document.addEventListener("keydown", () => {
    document.getElementById("boot").classList.add("hidden");
    document.getElementById("terminal").classList.remove("hidden");
    startGame();
});

// GAME ENGINE
let currentScene = STORY.intro;

function startGame() {
    renderScene(currentScene);
}

function renderScene(scene) {
    const out = document.getElementById("output");
    const ch = document.getElementById("choices");

    out.innerText = scene.text.join("\n");
    ch.innerHTML = "";

    scene.choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.innerText = "> " + choice.label;
        btn.onclick = () => {
            currentScene = STORY[choice.next];
            renderScene(currentScene);
        };
        ch.appendChild(btn);
    });
}
</script>

</body>
</html>
