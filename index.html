<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>پرونده‌ی سقوط فرشته‌ها</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========================================================= -->
  <!-- GAME HEADER (فقط وضعیت)                                   -->
  <!-- ========================================================= -->
  <header id="game-header" class="crime-header">
    <div class="header-left">
      <span class="badge-icon">📁</span>
      <span class="badge-text" id="case-id">CASE FILE #011</span>
    </div>
    <div class="header-center">
      <h1 id="main-title">The Fall of Angels</h1>
      <span class="subtitle" id="subtitle">— A Noir Detective Story —</span>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span class="status-text" id="status-text">ACTIVE</span>
    </div>
  </header>

  <!-- ========================================================= -->
  <!-- GAME CONTAINER                                            -->
  <!-- ========================================================= -->
  <main id="game-container" class="game-container">
    <!-- توسط جاوااسکریپت پر می‌شود -->
  </main>

  <!-- ========================================================= -->
  <!-- FOOTER                                                    -->
  <!-- ========================================================= -->
  <footer id="game-footer" class="crime-footer">
    <span>🕵️‍♂️</span>
    <span>Fremant P.D. — Case Closed? Never.</span>
    <span>🔍</span>
  </footer>

  <!-- ========================================================= -->
  <!-- SCRIPTS                                                   -->
  <!-- ========================================================= -->
  <script src="story.js"></script>
  <script src="story2.js"></script>
  <script src="game.js"></script>
</body>
</html>
